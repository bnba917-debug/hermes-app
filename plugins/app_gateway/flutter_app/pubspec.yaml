name: hermes_app
description: Cross-platform (Web / iOS / Android) client for Hermes App Gateway.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  record: ^5.2.0
  path_provider: ^2.1.5
  audioplayers: ^6.1.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  flutter_markdown: ^0.7.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_config.json
